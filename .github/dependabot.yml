version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      dependencies:
        dependency-type: 'production'
      dev-dependencies:
        dependency-type: 'development'
    labels:
      - 'dependencies'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'deps'
