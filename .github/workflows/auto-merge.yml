name: Auto-merge

on:
  pull_request:
  check_suite:

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.repository == 'mkelvers/mkelvers.tech'
    steps:
      - uses: actions/auto-merge@v3
        with:
          method: merge
          required-convenience-factor-minimum: 1
      - uses: actions/auto-merge@v3
        with:
          method: squash
          allowed-methods: |
            dependabot[bot]
          target: minor
