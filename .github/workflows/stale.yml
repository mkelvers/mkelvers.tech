name: Close stale issues

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    if: github.repository == 'mkelvers/mkelvers.tech'
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 7
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity.'
          close-issue-message: 'This issue was closed because it has been inactive for 60 days.'
          exempt-issue-labels: 'pinned,security'
